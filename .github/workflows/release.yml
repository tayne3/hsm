name: Release
run-name: ${{ github.actor }} is releasing the project 🚀

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "The tag to create a release for (ev.g., v1.0.0)"
        required: true
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        run: |
          cat > release_notes.md << EOF
          ## 📥 Quick Installation

          \`\`\`bash
          # Download header
          curl -o hsm.hpp https://github.com/tayne3/hsm/releases/download/${{ github.event.inputs.tag || github.ref_name }}/hsm.hpp
          \`\`\`

          ## 📝 Usage

          \`\`\`cpp
          #include "hsm.hpp"

          enum StateID { STATE_OFF, STATE_ON };

          struct Event { virtual ~Event() = default; };

          struct Traits {
              using StateID = StateID;
              using Event   = Event;
              struct Context {};
          };

          using Machine = hsm::Machine<Traits>;
          using Scope   = hsm::Scope<Traits>;

          struct Click : Event {};

          int main() {
              Machine sm;
              sm.start(STATE_OFF, [](Scope& s) {
                  s.state(STATE_OFF)
                      .handle([](Machine& sm, const Event& ev) {
                          return hsm::match(sm, ev).template on<Click>([](Machine& sm, const Click&) {
                              sm.transition(STATE_ON);
                              return hsm::Result::Done;
                          });
                      });

                  s.state(STATE_ON)
                      .handle([](Machine& sm, const Event& ev) {
                          return hsm::match(sm, ev).template on<Click>([](Machine& sm, const Click&) {
                              sm.transition(STATE_OFF);
                              return hsm::Result::Done;
                          });
                      });
              });

              sm.dispatch(Click{});
          }
          \`\`\`
          EOF

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release_notes.md
          files: include/hsm/hsm.hpp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
